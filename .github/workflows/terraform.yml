name: Terraform Multi-Cloud CI/CD (Enterprise)

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      cloud:
        description: "Which cloud(s) to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp
      enable_post_hardening:
        description: "Apply k8s hardening resources after Terraform apply"
        required: true
        default: false
        type: boolean
      runner:
        description: "Runner label (use 'self-hosted' for private clusters)"
        required: true
        default: "ubuntu-latest"
        type: string

env:
  TF_VERSION: "1.6.0"
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  SELECTED_CLOUD: ${{ inputs.cloud || 'all' }}
  ENABLE_POST_HARDENING: ${{ inputs.enable_post_hardening || 'false' }}
  RUNNER_LABEL: ${{ inputs.runner || 'ubuntu-latest' }}

jobs:
  fmt:
    name: Terraform fmt (repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive

  validate:
    name: Validate + policy checks (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform init (no backend) + validate
        working-directory: ${{ matrix.cloud }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: TFLint
        working-directory: ${{ matrix.cloud }}
        run: |
          tflint --init
          tflint

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ matrix.cloud }}
          soft_fail: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ matrix.cloud }}
          framework: terraform
          soft_fail: true